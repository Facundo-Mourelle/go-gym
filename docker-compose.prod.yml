version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: gym-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-gymtracker}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gym}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gym-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gym-backend
    environment:
      DATABASE_URL: "postgres://${DB_USER:-gym}:${DB_PASSWORD:-gympassword}@db:5432/${DB_NAME:-gymtracker}?sslmode=${DB_SSLMODE:-require}"
      JWT_SECRET: ${JWT_SECRET}
      PORT: 8080
      ENVIRONMENT: ${ENVIRONMENT:-production}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - gym-network
    restart: unless-stopped

  frontend:
    build:
      context: ./gym-tracker-frontend
      dockerfile: Dockerfile
    container_name: gym-frontend
    depends_on:
      - backend
    networks:
      - gym-network
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: gym-caddy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - ACME_AGREE=true
      - ACME_EMAIL=${ACME_EMAIL}
      - DOMAIN=${DOMAIN:-localhost}
      - API_DOMAIN=${API_DOMAIN:-api.localhost}
    depends_on:
      - backend
      - frontend
    networks:
      - gym-network
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  gym-network:
    driver: bridge
